<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article class="card-wrapper">
       <img src="assets/images/illustration-article.svg" width="336px" height="200px" alt="" class="card-image"/>
        
  
            <section class="card-content">
                <p class="category">Learning</p>
                <p class="publish-date">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
                <h3 class="title">HTML & CSS foundations</h3>
                <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.
                </p>
            </section>
            <section class="user-info">
                <div class="user">
                    <img src="/assets/images/image-avatar.webp" alt="Author's avatar" width="32" height="32" class="avatar">
                <p class="user-name">Greg Hooper</p>
                </div>
            </section>
   
    </article>
</body>

</html>
